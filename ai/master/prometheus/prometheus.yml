global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: 'smartness-observability'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'
rule_files:
  - "alerts/*.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config
  - job_name: 'prometheus'
    honor_timestamps: true
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus-master'

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    honor_timestamps: true
    file_sd_configs:
      - files:
          - 'file_sd/targets.json'
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'node-exporter:9100'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'node_cpu_seconds_total|node_memory_MemTotal_bytes|node_memory_MemAvailable_bytes|node_filesystem_size_bytes|node_filesystem_avail_bytes|node_network_receive_bytes_total|node_network_transmit_bytes_total'
        action: keep

  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    honor_timestamps: true
    file_sd_configs:
      - files:
          - 'file_sd/targets.json'
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'cadvisor:8080'

  # Blackbox Exporter - HTTP probes
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://localhost:9090
          - http://localhost:3000
          - http://localhost:9093
        labels:
          environment: 'internal'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'blackbox-exporter:9115'

  # Blackbox Exporter - TCP probes
  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - prometheus:9090
          - grafana:3000
          - alertmanager:9093
        labels:
          environment: 'internal'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'blackbox-exporter:9115'

  # Blackbox Exporter - ICMP probes
  - job_name: 'blackbox-icmp'
    metrics_path: /probe
    params:
      module: [icmp_ping]
    static_configs:
      - targets:
          - 8.8.8.8
          - 8.8.4.4
        labels:
          environment: 'external'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'blackbox-exporter:9115'

  # Docker daemon metrics (if enabled)
  - job_name: 'docker'
    honor_timestamps: true
    static_configs:
      - targets: ['host.docker.internal:9323']
        labels:
          instance: 'docker-daemon'

  # Nginx metrics (if nginx-exporter is used)
  - job_name: 'nginx'
    honor_timestamps: true
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          instance: 'nginx-proxy'