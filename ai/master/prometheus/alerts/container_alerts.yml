groups:
  - name: container_alerts
    rules:
      # Container CPU Usage
      - alert: ContainerHighCpuUsage
        expr: sum(rate(container_cpu_usage_seconds_total{name!=""}[5m])) by (name) * 100 > 80
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "High CPU usage in container {{ $labels.name }}"
          description: "Container {{ $labels.name }} CPU usage is above 80% for more than 5 minutes. Current value: {{ $value | printf \"%.2f\" }}%"
          runbook_url: "https://github.com/your-org/smartness-observability-infra/docs/TROUBLESHOOTING.md#container-cpu-usage"

      # Container Memory Usage
      - alert: ContainerHighMemoryUsage
        expr: (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""}) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "High memory usage in container {{ $labels.name }}"
          description: "Container {{ $labels.name }} memory usage is above 85% of limit. Current value: {{ $value | printf \"%.2f\" }}%"
          runbook_url: "https://github.com/your-org/smartness-observability-infra/docs/TROUBLESHOOTING.md#container-memory-usage"

      # Container Memory Usage Without Limit
      - alert: ContainerHighMemoryUsageNoLimit
        expr: container_memory_usage_bytes{name!=""} > 1073741824
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "High memory usage in container {{ $labels.name }}"
          description: "Container {{ $labels.name }} memory usage is above 1GB. Current value: {{ $value | humanize1024 }}B"

      # Container Restart Loop
      - alert: ContainerRestartLoop
        expr: increase(container_restart_count{name!=""}[1h]) > 3
        for: 5m
        labels:
          severity: critical
          category: container
        annotations:
          summary: "Container {{ $labels.name }} is in restart loop"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in the last hour."
          runbook_url: "https://github.com/your-org/smartness-observability-infra/docs/TROUBLESHOOTING.md#container-restart-loop"

      # Container OOMKilled
      - alert: ContainerOOMKilled
        expr: container_oom_events_total{name!=""} > 0
        for: 0m
        labels:
          severity: critical
          category: container
        annotations:
          summary: "Container {{ $labels.name }} was OOMKilled"
          description: "Container {{ $labels.name }} was killed due to out of memory."

      # Container Stopped
      - alert: ContainerStopped
        expr: time() - container_last_seen{name!=""} > 60
        for: 1m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "Container {{ $labels.name }} stopped"
          description: "Container {{ $labels.name }} has not been seen for more than 1 minute."

      # Container High Network I/O
      - alert: ContainerHighNetworkIO
        expr: sum(rate(container_network_receive_bytes_total{name!=""}[5m])) by (name) > 100000000 or sum(rate(container_network_transmit_bytes_total{name!=""}[5m])) by (name) > 100000000
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "High network I/O in container {{ $labels.name }}"
          description: "Container {{ $labels.name }} network I/O is above 100MB/s."

      # Container High Disk I/O
      - alert: ContainerHighDiskIO
        expr: sum(rate(container_fs_reads_bytes_total{name!=""}[5m])) by (name) > 50000000 or sum(rate(container_fs_writes_bytes_total{name!=""}[5m])) by (name) > 50000000
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "High disk I/O in container {{ $labels.name }}"
          description: "Container {{ $labels.name }} disk I/O is above 50MB/s."

      # Container Disk Space Usage
      - alert: ContainerDiskSpaceUsage
        expr: (container_fs_usage_bytes{name!=""} / container_fs_limit_bytes{name!=""}) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "High disk usage in container {{ $labels.name }}"
          description: "Container {{ $labels.name }} disk usage is above 85%. Current value: {{ $value | printf \"%.2f\" }}%"

      # Container Unhealthy
      - alert: ContainerUnhealthy
        expr: container_health_status{name!=""} == 2
        for: 1m
        labels:
          severity: critical
          category: container
        annotations:
          summary: "Container {{ $labels.name }} is unhealthy"
          description: "Container {{ $labels.name }} health check is failing."

      # Container Exit Code Non-Zero
      - alert: ContainerExitCodeNonZero
        expr: container_last_seen{name!=""} - container_start_time_seconds{name!=""} < 60 and container_exit_code{name!=""} != 0
        for: 0m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "Container {{ $labels.name }} exited with non-zero code"
          description: "Container {{ $labels.name }} exited with code {{ $value }}."

      # Docker Daemon High CPU
      - alert: DockerDaemonHighCpu
        expr: rate(process_cpu_seconds_total{job="docker"}[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          category: docker
        annotations:
          summary: "Docker daemon high CPU usage"
          description: "Docker daemon CPU usage is above 50%."

      # Docker Daemon High Memory
      - alert: DockerDaemonHighMemory
        expr: process_resident_memory_bytes{job="docker"} > 1073741824
        for: 5m
        labels:
          severity: warning
          category: docker
        annotations:
          summary: "Docker daemon high memory usage"
          description: "Docker daemon memory usage is above 1GB."

      # Docker Image Pull Errors
      - alert: DockerImagePullErrors
        expr: increase(docker_image_pull_errors_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
          category: docker
        annotations:
          summary: "Docker image pull errors"
          description: "Docker has encountered {{ $value }} image pull errors in the last hour."

      # Container CPU Throttling
      - alert: ContainerCpuThrottling
        expr: rate(container_cpu_cfs_throttled_seconds_total{name!=""}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "Container {{ $labels.name }} is being CPU throttled"
          description: "Container {{ $labels.name }} is being throttled {{ $value | printf \"%.2f\" }}% of the time."