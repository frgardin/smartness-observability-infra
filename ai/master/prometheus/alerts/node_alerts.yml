groups:
  - name: node_alerts
    rules:
      # High CPU Usage
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% for more than 5 minutes. Current value: {{ $value | printf \"%.2f\" }}%"
          runbook_url: "https://github.com/frgardin/smartness-observability-infra/docs/TROUBLESHOOTING.md#high-cpu-usage"

      # Critical CPU Usage
      - alert: CriticalCpuUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
          category: performance
        annotations:
          summary: "Critical CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 95% for more than 2 minutes. Current value: {{ $value | printf \"%.2f\" }}%"
          runbook_url: "https://github.com/frgardin/smartness-observability-infra/docs/TROUBLESHOOTING.md#critical-cpu-usage"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% for more than 5 minutes. Current value: {{ $value | printf \"%.2f\" }}%"
          runbook_url: "https://github.com/frgardin/smartness-observability-infra/docs/TROUBLESHOOTING.md#high-memory-usage"

      # Critical Memory Usage
      - alert: CriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
          category: performance
        annotations:
          summary: "Critical memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 95% for more than 2 minutes. Current value: {{ $value | printf \"%.2f\" }}%"
          runbook_url: "https://github.com/frgardin/smartness-observability-infra/docs/TROUBLESHOOTING.md#critical-memory-usage"

      # Low Disk Space
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: warning
          category: storage
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is below 10% on root filesystem. Current value: {{ $value | printf \"%.2f\" }}%"
          runbook_url: "https://github.com/frgardin/smartness-observability-infra/docs/TROUBLESHOOTING.md#low-disk-space"

      # Critical Disk Space
      - alert: CriticalDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 5
        for: 2m
        labels:
          severity: critical
          category: storage
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: "Disk space is below 5% on root filesystem. Current value: {{ $value | printf \"%.2f\" }}%"
          runbook_url: "https://github.com/frgardin/smartness-observability-infra/docs/TROUBLESHOOTING.md#critical-disk-space"

      # Disk Space Filling Up
      - alert: DiskSpaceFillingUp
        expr: predict_linear(node_filesystem_avail_bytes{mountpoint="/"}[6h], 24*3600) < 0
        for: 30m
        labels:
          severity: warning
          category: storage
        annotations:
          summary: "Disk space filling up on {{ $labels.instance }}"
          description: "Disk is predicted to fill up within 24 hours based on current usage trend."

      # Node Down
      - alert: NodeDown
        expr: up{job="node-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Node {{ $labels.instance }} is down"
          description: "Node exporter has been down for more than 1 minute."
          runbook_url: "https://github.com/frgardin/smartness-observability-infra/docs/TROUBLESHOOTING.md#node-down"

      # High Load Average
      - alert: HighLoadAverage
        expr: node_load15 / count without(cpu, mode) (node_cpu_seconds_total{mode="idle"}) > 2
        for: 10m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High load average on {{ $labels.instance }}"
          description: "15-minute load average is more than 2x the number of CPUs for more than 10 minutes."

      # Network Errors
      - alert: NetworkErrors
        expr: rate(node_network_receive_errs_total[5m]) > 0 or rate(node_network_transmit_errs_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          category: network
        annotations:
          summary: "Network errors on {{ $labels.instance }}"
          description: "Network interface {{ $labels.device }} is experiencing errors."

      # High Network Traffic
      - alert: HighNetworkTraffic
        expr: rate(node_network_receive_bytes_total[5m]) > 100000000 or rate(node_network_transmit_bytes_total[5m]) > 100000000
        for: 5m
        labels:
          severity: warning
          category: network
        annotations:
          summary: "High network traffic on {{ $labels.instance }}"
          description: "Network traffic is above 100MB/s for more than 5 minutes."

      # Systemd Service Failed
      - alert: SystemdServiceFailed
        expr: node_systemd_unit_state{state="failed"} == 1
        for: 1m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "Systemd service failed on {{ $labels.instance }}"
          description: "Service {{ $labels.name }} has failed."

      # High Swap Usage
      - alert: HighSwapUsage
        expr: (1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High swap usage on {{ $labels.instance }}"
          description: "Swap usage is above 80%. Current value: {{ $value | printf \"%.2f\" }}%"

      # Clock Skew
      - alert: ClockSkew
        expr: abs(node_timex_offset_seconds) > 0.05
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "Clock skew detected on {{ $labels.instance }}"
          description: "System clock is off by more than 50ms."

      # Filesystem Errors
      - alert: FilesystemErrors
        expr: node_filesystem_device_error{fstype!="tmpfs"} == 1
        for: 1m
        labels:
          severity: critical
          category: storage
        annotations:
          summary: "Filesystem errors on {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} has errors."