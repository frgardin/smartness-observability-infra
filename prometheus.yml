global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  # - "first.rules"
  # - "second.rules"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    file_sd_configs:
      - files:
          - '/etc/prometheus/file_sd/targets.json'
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [hostname]
        target_label: instance
